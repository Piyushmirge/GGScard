<!DOCTYPE html>
<html>
<head>
  <title>Work Anniversary Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      text-align: center;
      padding: 20px;
    }

    .employee-form {
      background: white;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      max-width: 350px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    input {
      margin: 5px;
      padding: 8px;
      width: 90%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      display: inline-block;
      width: 250px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h2>🎉 Work Anniversary Generator</h2>

<div id="forms"></div>

<button onclick="addEmployee()">➕ Add Employee</button>
<button onclick="generateCards()">🎨 Generate Cards</button>

<div id="cards"></div>

<!-- html2canvas CDN -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let employees = [];

function addEmployee() {
  const id = Date.now();

  const form = document.createElement("div");
  form.className = "employee-form";
  form.innerHTML = `
    <input placeholder="Employee Name" id="name-${id}">
    <input type="date" id="date-${id}">
    <input type="file" id="photo-${id}">
    <input placeholder="Message" id="msg-${id}">
  `;

  document.getElementById("forms").appendChild(form);

  employees.push(id);
}

function calculateYears(startDate) {
  const start = new Date(startDate);
  const today = new Date();
  let years = today.getFullYear() - start.getFullYear();

  const m = today.getMonth() - start.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < start.getDate())) {
    years--;
  }
  return years;
}

function generateCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  employees.forEach(id => {
    const name = document.getElementById(`name-${id}`).value;
    const date = document.getElementById(`date-${id}`).value;
    const msg = document.getElementById(`msg-${id}`).value;
    const file = document.getElementById(`photo-${id}`).files[0];

    const reader = new FileReader();

    reader.onload = function(e) {
      const years = calculateYears(date);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${e.target.result}">
        <h3>${name}</h3>
        <p>🏆 ${years} Years</p>
        <p>${msg}</p>
        <button onclick="downloadCard(this)">Download</button>
      `;

      container.appendChild(card);
    };

    if (file) reader.readAsDataURL(file);
  });
}

function downloadCard(btn) {
  const card = btn.parentElement;

  html2canvas(card).then(canvas => {
    const link = document.createElement("a");
    link.download = "work-anniversary.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// Add first employee by default
addEmployee();
</script>

</body>
</html>
