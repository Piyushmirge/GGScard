<!DOCTYPE html>
<html>
<head>
  <title>Work Anniversary Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 6px;
      width: 80%;
      max-width: 320px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 25px;
      border-radius: 15px;
      background: white;
      display: inline-block;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      max-width: 350px;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>🎉 Work Anniversary Generator</h2>

<input id="name" placeholder="Employee Name"><br>
<input id="start" type="date"><br>
<input id="today" type="date"><br>
<input id="photo" type="file"><br>
<input id="msg" placeholder="Message"><br>

<button onclick="generate()">Generate Card</button>

<p id="card"></p>

<div id="card"></div>

<script>
let imageBase64 = "";

// Convert image to base64
document.getElementById("photo").addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    imageBase64 = e.target.result;
  };
  reader.readAsDataURL(file);
});

function calculateYears(startDate) {
  const start = new Date(startDate);
  const today = new Date();
  let years = today.getFullYear() - start.getFullYear();

  const m = today.getMonth() - start.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < start.getDate())) {
    years--;
  }
  return years;
}

function generate() {
  const name = encodeURIComponent(document.getElementById("name").value);
  const from = encodeURIComponent(document.getElementById("from").value);
  const company = encodeURIComponent(document.getElementById("company").value);
  const start = document.getElementById("start").value;
  const msg = encodeURIComponent(document.getElementById("msg").value);

  const years = calculateYears(start);

  const url = `${window.location.origin}?name=${name}&from=${from}&company=${company}&years=${years}&msg=${msg}&img=${encodeURIComponent(imageBase64)}`;

  document.getElementById("link").innerHTML =
    `<a href="${url}" target="_blank">Share Card</a>`;
}

// Load card
const params = new URLSearchParams(window.location.search);

if (params.get("name")) {
  document.getElementById("card").innerHTML = `
    <div class="card">
      <img src="${params.get("img") || ''}" />
      <h2>🏆 Happy Work Anniversary</h2>
      <h3>${params.get("name")}</h3>
      <p>🎯 ${params.get("years")} Years</p>
      <p>💬 ${params.get("msg")}</p>
      <p>— From ${params.get("from")}</p>
    </div>
  `;
}
</script>

</body>
</html>
