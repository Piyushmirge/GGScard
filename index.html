<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Anniversary Card Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Work Anniversary Card Generator</h1>
        <form id="work-anniversary-form">
            <label for="members">Select Members:</label>
            <input type="text" id="members" name="members" placeholder="Enter member names, separated by commas">
            <label for="photos">Upload Photos:</label>
            <input type="file" id="photos" name="photos" multiple accept="image/*">
            <label for="background">Select Professional Background:</label>
            <select id="background" name="background">
                <option value="background1">Background 1</option>
                <option value="background2">Background 2</option>
                <option value="background3">Background 3</option>
            </select>
            <button type="submit">Generate Card</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
