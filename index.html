<!DOCTYPE html>
<html>
<head>
  <title>Work Anniversary Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #dbeafe, #f0f9ff);
      padding: 20px;
    }

    h1 { color: #1e3a8a; }

    input {
      padding: 10px;
      margin: 8px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 25px;
      border-radius: 15px;
      background: white;
      display: inline-block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      max-width: 350px;
    }

    .badge {
      font-size: 40px;
    }
  </style>
</head>
<body>

<h1>🎉 Work Anniversary Generator</h1>

<input id="name" placeholder="Employee Name"><br>
<input id="years" placeholder="Years in Company"><br>
<input id="company" placeholder="Company Name"><br>
<input id="msg" placeholder="Message"><br>

<button onclick="generate()">Generate Link</button>

<p id="link"></p>

<div id="card"></div>

<script>
function generate() {
  const name = encodeURIComponent(document.getElementById("name").value);
  const years = encodeURIComponent(document.getElementById("years").value);
  const company = encodeURIComponent(document.getElementById("company").value);
  const msg = encodeURIComponent(document.getElementById("msg").value);

  const url = `${window.location.origin}?name=${name}&years=${years}&company=${company}&msg=${msg}`;
  document.getElementById("link").innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;
}

// Load card from URL
const params = new URLSearchParams(window.location.search);

if (params.get("name")) {
  document.getElementById("card").innerHTML = `
    <div class="card">
      <div class="badge">🏆</div>
      <h2>Happy Work Anniversary!</h2>
      <h3>${params.get("name")}</h3>
      <p>🎯 ${params.get("years")} Years at ${params.get("company")}</p>
      <p>💬 ${params.get("msg")}</p>
      <p>👏 Thank you for your dedication!</p>
    </div>
  `;
}
</script>

</body>
</html>
