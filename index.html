<!DOCTYPE html>
<html>
<head>
  <title>Anniversary Card Generator</title>
  <style>
    body { font-family: Arial; text-align: center; background: #ffe6e6; }
    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      background: white;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<h1>💑 Anniversary Card Generator</h1>

<input id="name" placeholder="Couple Name"><br><br>
<input id="year" placeholder="Years"><br><br>
<input id="msg" placeholder="Message"><br><br>

<button onclick="generate()">Generate Link</button>

<p id="link"></p>

<div id="card"></div>

<script>
function generate() {
  const name = document.getElementById("name").value;
  const year = document.getElementById("year").value;
  const msg = document.getElementById("msg").value;

  const url = `${window.location.origin}?name=${name}&year=${year}&msg=${msg}`;
  document.getElementById("link").innerHTML = `<a href="${url}">${url}</a>`;
}

// Auto load card from URL
const params = new URLSearchParams(window.location.search);
if(params.get("name")) {
  document.getElementById("card").innerHTML = `
    <div class="card">
      <h2>💖 Happy Anniversary 💖</h2>
      <h3>${params.get("name")}</h3>
      <p>${params.get("year")} Years Together</p>
      <p>${params.get("msg")}</p>
    </div>
  `;
}
</script>

</body>
</html>
