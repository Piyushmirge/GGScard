<!DOCTYPE html>
<html>
<head>
  <title>Work Anniversary Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #dbeafe, #f0f9ff);
    }

    .employee-form {
      background: white;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      max-width: 350px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      position: relative;
    }

    .remove-btn {
      position: absolute;
      top: 5px;
      right: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      cursor: pointer;
    }

    input {
      margin: 5px;
      padding: 8px;
      width: 90%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    /* 🎨 Card with background */
    .card {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      padding: 20px;
      margin: 15px;
      border-radius: 20px;
      display: inline-block;
      width: 260px;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .logo {
      width: 60px;
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .profile {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 20px;
      border: 3px solid white;
    }

    .download-btn {
      margin-top: 10px;
      background: #16a34a;
    }
  </style>
</head>
<body>

<h2>🎉 Work Anniversary Generator</h2>

<div id="forms"></div>

<button onclick="addEmployee()">➕ Add Employee</button>
<button onclick="generateCards()">🎨 Generate Cards</button>

<div id="cards"></div>

<!-- html2canvas -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let employees = [];

function addEmployee() {
  const id = Date.now();

  const form = document.createElement("div");
  form.className = "employee-form";
  form.id = "form-" + id;

  form.innerHTML = `
    <button class="remove-btn" onclick="removeEmployee(${id})">×</button>
    <input placeholder="Employee Name" id="name-${id}">
    <input type="date" id="date-${id}">
    <input type="file" id="photo-${id}">
    <input placeholder="Message" id="msg-${id}">
  `;

  document.getElementById("forms").appendChild(form);
  employees.push(id);
}

function removeEmployee(id) {
  document.getElementById("form-" + id).remove();
  employees = employees.filter(e => e !== id);
}

function calculateYears(startDate) {
  const start = new Date(startDate);
  const today = new Date();
  let years = today.getFullYear() - start.getFullYear();

  const m = today.getMonth() - start.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < start.getDate())) {
    years--;
  }
  return years;
}

function generateCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  employees.forEach(id => {
    const name = document.getElementById(`name-${id}`).value;
    const date = document.getElementById(`date-${id}`).value;
    const msg = document.getElementById(`msg-${id}`).value;
    const file = document.getElementById(`photo-${id}`).files[0];

    const reader = new FileReader();

    reader.onload = function(e) {
      const years = calculateYears(date);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <!-- 🏢 Replace this with your real logo URL -->
        <img class="logo" src="https://via.placeholder.com/60?text=GGS">

        <img class="profile" src="${e.target.result}">
        <h3>${name}</h3>
        <p>🏆 ${years} Years</p>
        <p>${msg}</p>

        <button class="download-btn" onclick="downloadCard(this)">Download</button>
      `;

      container.appendChild(card);
    };

    if (file) reader.readAsDataURL(file);
  });
}

function downloadCard(btn) {
  const card = btn.parentElement;

  // Hide button before capture
  btn.style.display = "none";

  html2canvas(card).then(canvas => {
    const link = document.createElement("a");
    link.download = "work-anniversary.png";
    link.href = canvas.toDataURL();
    link.click();

    // Show button again after download
    btn.style.display = "block";
  });
}

// Default form
addEmployee();
</script>

</body>
</html>
