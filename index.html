<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Card Types</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Card Types</h1>
    </header>
    <main>
        <section class="cards">
            <div class="card anniversary">
                <h2>Anniversary</h2>
                <div class="photos">
                    <img src="anniversary1.jpg" alt="Anniversary Celebration 1">
                    <img src="anniversary2.jpg" alt="Anniversary Celebration 2">
                </div>
                <p>Celebrate your special day with love and joy!</p>
                <div class="team-members">
                    <p>Members:</p>
                    <ul>
                        <li>John Doe</li>
                        <li>Jane Smith</li>
                    </ul>
                </div>
            </div>
            <div class="card work">
                <h2>Work</h2>
                <div class="photos">
                    <img src="work1.jpg" alt="Work Event 1">
                    <img src="work2.jpg" alt="Work Event 2">
                    <img src="work3.jpg" alt="Work Event 3">
                </div>
                <p>Teamwork makes the dream work!</p>
                <div class="team-members">
                    <p>Members:</p>
                    <ul>
                        <li>Alex Brown</li>
                        <li>Emma Wilson</li>
                        <li>Chris Johnson</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Your Company</p>
    </footer>
</body>
</html>
